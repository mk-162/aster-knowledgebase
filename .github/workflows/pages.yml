# Builds the help centre (Jekyll + just-the-docs) and publishes the built HTML
# to the gh-pages branch. GitHub Pages serves that branch (Settings > Pages >
# Source: Deploy from a branch > gh-pages / root).
#
# Why branch-deploy instead of actions/deploy-pages: the Actions-based Pages
# pipeline wedged this repo's first deployments in deployment_queued twice
# (10-min timeouts, site status stuck null). The classic branch pipeline is
# the boring reliable path and needs no Pages API calls from the workflow.
name: publish
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
      - run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production
      - name: Push _site to gh-pages
        run: |
          cd _site
          touch .nojekyll
          git init -q -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -qm "publish: ${GITHUB_SHA::7}"
          git push -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
